services:
  - type: web
    name: automation-front-test
    runtime: docker
    dockerfilePath: ./dockerfile
    plan: standard
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: AWS_REGION
        value: eu-central-1
      - key: S3_BUCKET
        value: front-automation
      - key: GOOGLE_API_KEY
        sync: false
      - key: TWELVELABS_API_KEY
        sync: false
      - key: AWS_S3_VECTOR_INDEX_ARN
        sync: false
      - key: PIPELINE_API_SECRET
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
